server {
    listen 80;
    server_name trimio.pt www.trimio.pt;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name trimio.pt www.trimio.pt;

    ssl_certificate /etc/letsencrypt/live/trimio.pt/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/trimio.pt/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/trimio/web/dist;
    index index.html;

    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    etag on;

    location /api/                  { proxy_pass http://127.0.0.1:3000; }
    location = /install-manifest.webmanifest { proxy_pass http://127.0.0.1:3000; }
    location = /sitemap.xml         { proxy_pass http://127.0.0.1:3000; proxy_read_timeout 10s; }
    location = /robots.txt          { proxy_pass http://127.0.0.1:3000; proxy_read_timeout 5s; }

    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        access_log off;
    }

    location /branding/ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000" always;
        access_log off;
    }

    location = /push-sw.js {
        try_files $uri =404;
        expires 5m;
        add_header Cache-Control "public, max-age=300" always;
    }

    # Reserved SPA routes — serve index.html directly (no Express)
    location = /admin               { try_files /index.html =404; }
    location = /superadmin          { try_files /index.html =404; }
    location = /register            { try_files /index.html =404; }
    location = /verify-email        { try_files /index.html =404; }
    location /admin/                { try_files $uri $uri/ /index.html; }
    location /superadmin/           { try_files $uri $uri/ /index.html; }
    location /barber/               { try_files $uri $uri/ /index.html; }

    # Barbershop slug pages — proxy to Express for SEO meta tag injection
    location ~ ^/[a-z0-9][a-z0-9-]*/?$ {
        proxy_pass http://127.0.0.1:3000;
        proxy_read_timeout 8s;
        proxy_intercept_errors on;
        error_page 502 503 504 = @spa;
    }

    location /                      { try_files $uri $uri/ /index.html; }
    location @spa                   { rewrite ^ /index.html last; }
}
