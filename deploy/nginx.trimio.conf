server {
    listen 80;
    server_name _;

    root /var/www/trimio/web/dist;
    index index.html;

    # Shared proxy headers
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # API
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
    }

    # PWA manifest
    location = /install-manifest.webmanifest {
        proxy_pass http://127.0.0.1:3000;
    }

    # SEO — sitemap, robots (served by Express with real data)
    location = /sitemap.xml {
        proxy_pass http://127.0.0.1:3000;
        proxy_read_timeout 10s;
    }

    location = /robots.txt {
        proxy_pass http://127.0.0.1:3000;
        proxy_read_timeout 5s;
    }

    # Public barbershop pages — proxy to Express for meta tag injection.
    # Matches /:slug only (not /admin, /api, /assets, /branding, etc.)
    location ~ ^/(?!(api|admin|superadmin|register|verify-email|barber|assets|branding|push-sw)[/\.])[a-z0-9][a-z0-9-]*/?$ {
        proxy_pass http://127.0.0.1:3000;
        proxy_read_timeout 8s;
        # If Express is down or errors, fall back to the SPA
        proxy_intercept_errors on;
        error_page 502 503 504 = @spa;
    }

    # SPA fallback — all other routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    location @spa {
        rewrite ^ /index.html last;
    }
}
