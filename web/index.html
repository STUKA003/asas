<!doctype html>
<html lang="pt-PT">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/branding/platform-logo-favicon.png" />
    <link rel="apple-touch-icon" href="/branding/platform-logo-touch.png" />
    <meta name="application-name" content="Trimio" />
    <meta name="apple-mobile-web-app-title" content="Trimio" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#09090b" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (function () {
        var path = window.location.pathname || '/'
        var reserved = { admin: true, superadmin: true, register: true, 'verify-email': true, barber: true }
        var brand = {
          title: 'Trimio',
          shortTitle: 'Trimio',
          theme: '#09090b',
          background: '#ffffff',
          iconPath: '/branding/platform-logo-favicon.png',
          touchPath: '/branding/platform-logo-touch.png',
          appId: '/',
          startUrl: '/',
          scope: '/',
        }

        if (path === '/admin' || path.indexOf('/admin/') === 0) {
          brand = {
            title: 'Trimio Studio',
            shortTitle: 'Studio',
            theme: '#09090b',
            background: '#09090b',
            iconPath: '/branding/admin-logo-favicon.png',
            touchPath: '/branding/admin-logo-touch.png',
            appId: '/admin',
            startUrl: '/admin',
            scope: '/admin',
          }
        } else if (path === '/superadmin' || path.indexOf('/superadmin/') === 0) {
          brand = {
            title: 'Trimio Command',
            shortTitle: 'Command',
            theme: '#0f172a',
            background: '#0f172a',
            iconPath: '/branding/superadmin-logo-favicon.png',
            touchPath: '/branding/superadmin-logo-touch.png',
            appId: '/superadmin',
            startUrl: '/superadmin',
            scope: '/superadmin',
          }
        } else if (path === '/barber/login' || path.indexOf('/barber/') === 0) {
          brand = {
            title: 'Trimio Flow',
            shortTitle: 'Flow',
            theme: '#f97316',
            background: '#f97316',
            iconPath: '/branding/barber-logo-favicon.png',
            touchPath: '/branding/barber-logo-touch.png',
            appId: '/barber/login',
            startUrl: '/barber/login',
            scope: '/barber',
          }
        } else {
          var barberMatch = path.match(/^\/([^/]+)\/barber(?:\/.*)?$/)
          if (barberMatch) {
            var barberBase = '/' + barberMatch[1] + '/barber'
            brand = {
              title: 'Trimio Flow',
              shortTitle: 'Flow',
              theme: '#f97316',
              background: '#f97316',
              iconPath: '/branding/barber-logo-favicon.png',
              touchPath: '/branding/barber-logo-touch.png',
              appId: barberBase,
              startUrl: barberBase,
              scope: barberBase,
            }
          } else {
            var publicMatch = path.match(/^\/([^/]+)(?:\/.*)?$/)
            var firstSegment = publicMatch && publicMatch[1]
            if (firstSegment && !reserved[firstSegment]) {
              var publicBase = '/' + firstSegment
              brand = {
                title: 'Trimio Clientes',
                shortTitle: 'Clientes',
                theme: '#09090b',
                background: '#ffffff',
                iconPath: '/branding/clients-logo-favicon.png',
                touchPath: '/branding/clients-logo-touch.png',
                appId: publicBase,
                startUrl: publicBase,
                scope: publicBase,
              }
            }
          }
        }

        document.title = brand.title

        function ensureMeta(name, content) {
          var meta = document.head.querySelector('meta[name="' + name + '"]')
          if (!meta) {
            meta = document.createElement('meta')
            meta.name = name
            document.head.appendChild(meta)
          }
          meta.content = content
        }

        function ensureLink(rel) {
          var link = document.head.querySelector('link[rel="' + rel + '"]')
          if (!link) {
            link = document.createElement('link')
            link.rel = rel
            document.head.appendChild(link)
          }
          return link
        }

        ensureMeta('application-name', brand.title)
        ensureMeta('apple-mobile-web-app-title', brand.title)
        ensureMeta('theme-color', brand.theme)

        var icon = ensureLink('icon')
        icon.href = brand.iconPath
        icon.type = 'image/png'

        var appleTouchIcon = ensureLink('apple-touch-icon')
        appleTouchIcon.href = brand.touchPath
        appleTouchIcon.sizes = '180x180'

        var manifestLink = ensureLink('manifest')
        var manifestHref = '/install-manifest.webmanifest?surface=platform'
        if (brand.appId === '/admin') {
          manifestHref = '/install-manifest.webmanifest?surface=admin'
        } else if (brand.appId === '/superadmin') {
          manifestHref = '/install-manifest.webmanifest?surface=superadmin'
        } else if (path === '/barber/login' || path.indexOf('/barber/') === 0) {
          manifestHref = '/install-manifest.webmanifest?surface=barber'
        } else if (path.match(/^\/([^/]+)\/barber(?:\/.*)?$/)) {
          var barberSlug = path.split('/')[1]
          manifestHref = '/install-manifest.webmanifest?surface=barber&slug=' + encodeURIComponent(barberSlug)
        } else {
          var publicSlug = path.split('/')[1]
          if (publicSlug && !reserved[publicSlug]) {
            manifestHref = '/install-manifest.webmanifest?surface=clients&slug=' + encodeURIComponent(publicSlug)
          }
        }
        manifestLink.href = manifestHref
      })()
    </script>
    <title>Trimio — Sistema de Agendamento para Barbearias</title>
    <meta name="description" content="O Trimio dá à tua barbearia uma página de reservas online. Os clientes marcam quando quiserem, sem WhatsApp nem chamadas. Grátis para começar." />
    <meta name="keywords" content="agendamento barbearia, reservas online barbearia, software barbearia, gestão barbearia, marcações online" />
    <link rel="canonical" href="https://trimio.pt/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://trimio.pt/" />
    <meta property="og:site_name" content="Trimio" />

    <meta property="og:description" content="Página de reservas online para a tua barbearia. Os clientes marcam 24h/dia sem WhatsApp nem chamadas. Grátis para começar." />
    <meta property="og:locale" content="pt_PT" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Trimio — Agendamento Online para Barbearias" />

    <div id="root"></div>
